<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<style>
body {
  background-color: #1a1a2e; /* deep navy */
  color: #f8c291; /* soft golden */
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  text-align: center;
}
#text {
  white-space: pre-line;
  max-width: 700px;
  font-size: 1.2em;
}
#buttons button {
  margin: 10px;
  padding: 12px 30px;
  background: transparent;
  border: 1px solid #f8c291;
  color: #f8c291;
  cursor: pointer;
  transition: 0.3s ease;
  font-size: 1em;
}
#buttons button:hover {
  background-color: #f8c291;
  color: #1a1a2e;
}
.fade-in {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}
@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>
<body>

<div id="text"></div>
<div id="buttons" style="display:none;">
  <button onclick="chooseYes()">Yes ✅</button>
  <button onclick="chooseYes()">Yes ❤️</button>
</div>

<script>
// Split the message into lines for safety
const lines = [
"> Booting emotional honesty module...",
"> Warning: vulnerability detected.",
"",
"There are many things I could try to give you",
"for your birthday.",
"",
"Something impressive.",
"Something clever.",
"Something expensive.",
"",
"But the truth is…",
"",
"What I want most",
"is to slow the world down",
"and sit beside you.",
"",
"In our comfortable silence.",
"No noise.",
"No distractions.",
"No one but the two of us.",
"",
"Will you let me take you",
"on a birthday picnic,",
"so I can celebrate",
"the person who makes my life",
"feel steady and safe?"
];

let i = 0;
let textEl = document.getElementById("text");
const charDelay = 50;
const lineBreakDelay = 400;

function typeLine(lineIndex) {
  if (lineIndex < lines.length) {
    let line = lines[lineIndex];
    let j = 0;
    function typeChar() {
      if (j < line.length) {
        textEl.innerHTML += line.charAt(j);
        j++;
        setTimeout(typeChar, charDelay);
      } else {
        textEl.innerHTML += "\n";
        setTimeout(() => typeLine(lineIndex + 1), lineBreakDelay);
      }
    }
    typeChar();
  } else {
    document.getElementById("buttons").style.display = "block";
    document.getElementById("buttons").classList.add("fade-in");
  }
}

typeLine(0);

function chooseYes() {
  document.body.innerHTML = `
    <h1 class="fade-in">She said yes.</h1>
    <p class="fade-in">Best decision I've ever seen.</p>
  `;
}
</script>

</body>
</html>
