<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<style>
body {
  background-color: #1a1a2e; /* deep navy */
  color: #f8c291; /* soft golden */
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  text-align: center;
}
#text {
  white-space: pre-line;
  max-width: 700px;
  font-size: 1.2em;
}
button {
  margin: 10px;
  padding: 12px 30px;
  background: transparent;
  border: 1px solid #f8c291;
  color: #f8c291;
  font-family: monospace;
  cursor: pointer;
  transition: 0.3s ease;
  font-size: 1em;
}
button:hover {
  background-color: #f8c291;
  color: #1a1a2e;
}
.fade-in {
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}
@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>
<body>

<div id="text"></div>
<div id="buttons" style="display:none;">
  <button onclick="chooseYes()">Yes ✅</button>
  <button onclick="chooseYes()">Yes ❤️</button>
</div>

<script>
const message = `
> Booting emotional honesty module...
> Warning: vulnerability detected.

There are many things I could try to give you
for your birthday.

Something impressive.
Something clever.
Something expensive.

But the truth is…

What I want most
is to slow the world down
and sit beside you.

In our comfortable silence.
No noise.
No distractions.
No one but the two of us.


Will you let me take you
on a birthday picnic,
so I can celebrate
the person who makes my life
feel steady and safe?
`;

let i = 0;
const textEl = document.getElementById("text");
const btnEl = document.getElementById("buttons");
const charDelay = 50;       // speed of each character
const lineBreakDelay = 400; // pause at line breaks

function typeWriter() {
  if (i < message.length) {
    const char = message.charAt(i);
    textEl.innerHTML += char;
    i++;
    if (char === '\n') {
      setTimeout(typeWriter, lineBreakDelay);
    } else {
      setTimeout(typeWriter, charDelay);
    }
  } else {
    btnEl.style.display = "block"; // show the choice buttons
    btnEl.classList.add("fade-in");
  }
